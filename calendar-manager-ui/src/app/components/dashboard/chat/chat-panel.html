<div class="chat-container">
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="header-content">
      <span class="header-title">Assistant</span>
    </div>
    <div class="header-actions">
      <button class="new-chat-btn" (click)="onNewConversation()" title="Start new conversation">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New
      </button>
    </div>
    <div class="header-status" *ngIf="processing()">
      <span class="status-dot"></span>
      <span class="status-text">Thinking...</span>
    </div>
  </div>

  <!-- Messages Area -->
  <div class="messages-container" #messagesContainer>
    <!-- Welcome Message -->
    <div class="message ai-message info" *ngIf="messages().length === 0">
      <div class="message-content">
        <div class="message-avatar">✨</div>
        <div class="message-body">
          <div class="message-text">
            Hi! I'm your AI Calendar Assistant. I can help you:
          </div>
          <div class="suggestions">
            <button class="suggestion-btn" (click)="messageInput = 'Show my calendar events'; onSend()">
              Show my events
            </button>
            <button class="suggestion-btn" (click)="messageInput = 'Schedule a meeting tomorrow at 2pm'; onSend()">
              Schedule a meeting
            </button>
            <button class="suggestion-btn" (click)="messageInput = 'What events do I have today?'; onSend()">
              What's on today
            </button>
          </div>
          <div class="message-time">Just now</div>
        </div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div
      *ngFor="let message of messages(); let i = index"
      class="message"
      [ngClass]="getMessageClass(message)"
      [class.typing]="processing() && i === messages().length - 1"
    >
      <div class="message-content">
        <div class="message-avatar" *ngIf="!message.isUser">✨</div>
        <div class="message-body">
          <div class="message-text">{{ message.text }}</div>
          <div class="message-time">{{ message.timestamp | date:'shortTime' }}</div>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="message ai-message typing" *ngIf="processing() && messages().length > 0">
      <div class="message-content">
        <div class="message-avatar">✨</div>
        <div class="message-body">
          <div class="typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-container">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="messageInput"
        (keypress)="onKeyPress($event)"
        placeholder="Ask me to schedule meetings..."
        [disabled]="processing()"
        rows="1"
        class="message-input"
      ></textarea>
      <button
        class="send-btn"
        (click)="onSend()"
        [disabled]="!messageInput.trim() || processing()"
        aria-label="Send message"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">
      Press Enter to send, Shift+Enter for new line
    </div>
  </div>
</div>
