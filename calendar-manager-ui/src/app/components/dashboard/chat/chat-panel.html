<div class="chat-container">
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="header-content">
      <span class="ai-icon">🤖</span>
      <span class="header-title">AI Calendar Assistant</span>
    </div>
    <div class="header-status" *ngIf="processing">
      <span class="status-dot"></span>
      <span class="status-text">Thinking...</span>
    </div>
  </div>

  <!-- Messages Area -->
  <div class="messages-container" #messagesContainer>
    <!-- Welcome Message -->
    <div class="message ai-message info" *ngIf="messages.length === 0">
      <div class="message-content">
        <div class="message-avatar">🤖</div>
        <div class="message-body">
          <div class="message-text">
            Hi! I'm your AI Calendar Assistant. I can help you:
          </div>
          <div class="suggestions">
            <button class="suggestion-btn" (click)="messageInput = 'Show my calendar events'; onSend()">
              📅 Show my events
            </button>
            <button class="suggestion-btn" (click)="messageInput = 'Schedule a meeting tomorrow at 2pm'; onSend()">
              📝 Schedule a meeting
            </button>
            <button class="suggestion-btn" (click)="messageInput = 'What events do I have today?'; onSend()">
              🔍 What's on today
            </button>
          </div>
          <div class="message-time">Just now</div>
        </div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div
      *ngFor="let message of messages; let i = index"
      class="message"
      [ngClass]="getMessageClass(message)"
      [class.typing]="processing && i === messages.length - 1"
    >
      <div class="message-content">
        <div class="message-avatar">{{ message.isUser ? '👤' : '🤖' }}</div>
        <div class="message-body">
          <div class="message-text">{{ message.text }}</div>
          <div class="message-time">{{ message.timestamp | date:'shortTime' }}</div>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="message ai-message typing" *ngIf="processing && messages.length > 0">
      <div class="message-content">
        <div class="message-avatar">🤖</div>
        <div class="message-body">
          <div class="typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-container">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="messageInput"
        (keypress)="onKeyPress($event)"
        placeholder="Ask me to schedule meetings, check your calendar, or manage events..."
        [disabled]="processing"
        rows="1"
        class="message-input"
      ></textarea>
      <button
        class="send-btn"
        (click)="onSend()"
        [disabled]="!messageInput.trim() || processing"
        aria-label="Send message"
      >
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">
      Press Enter to send, Shift+Enter for new line
    </div>
  </div>
</div>
