<div class="dashboard-container">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-content">
      <h1>🗓️ AI Calendar</h1>
      <div class="user-info" *ngIf="user$ | async as user">
        <span class="welcome">Welcome, {{ user.displayName }}!</span>
        <button class="logout-btn" (click)="onLogout()" [disabled]="loading$ | async">
          Logout
        </button>
      </div>
    </div>
    <div class="header-actions">
      <button class="test-btn" (click)="onTestToken()" [disabled]="loading$ | async">
        🧪 Test
      </button>
      <button class="refresh-btn" (click)="onLoadCalendar()" [disabled]="calendarLoading$ | async">
        🔄
      </button>
    </div>
  </header>

  <!-- Mobile Toggle -->
  <div class="mobile-toggle" *ngIf="showMobileToggle">
    <button
      class="toggle-btn"
      [class.active]="activePanel === 'chat'"
      (click)="setActivePanel('chat')"
    >
      💬 Chat
    </button>
    <button
      class="toggle-btn"
      [class.active]="activePanel === 'calendar'"
      (click)="setActivePanel('calendar')"
    >
      📅 Calendar
    </button>
  </div>

  <!-- Main Content - Split Layout -->
  <main class="dashboard-main">
    <!-- Chat Panel (60% on desktop) -->
    <section class="chat-section" [class.mobile-hidden]="showMobileToggle && activePanel !== 'chat'">
      <app-chat-panel
        [messages]="(messages$ | async) || []"
        [processing]="(chatProcessing$ | async) || false"
        (sendMessage)="onSendMessage($event)"
      ></app-chat-panel>
    </section>

    <!-- Calendar Panel (40% on desktop) -->
    <section class="calendar-section" [class.mobile-hidden]="showMobileToggle && activePanel !== 'calendar'">
      <app-calendar-view
        [events]="(events$ | async) || []"
        [highlightedEventId]="highlightedEventId"
        [loading]="(calendarLoading$ | async) || false"
        (daySelected)="onDaySelected($event)"
        (eventSelected)="onEventSelected($event)"
      ></app-calendar-view>
    </section>
  </main>
</div>
