<div class="calendar-container">
  <!-- Calendar Header -->
  <div class="calendar-header">
    <h3 class="month-title" (click)="goToToday()">{{ getMonthYear() }}</h3>
    <div class="nav-actions">
      <button class="nav-btn" (click)="previousMonth()" aria-label="Previous month">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button class="nav-btn" (click)="nextMonth()" aria-label="Next month">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- Calendar Grid -->
  <div class="calendar-grid">
    <!-- Week Day Headers -->
    <div class="weekday-header" *ngFor="let day of weekDays">
      {{ day }}
    </div>

    <!-- Calendar Days -->
    <div
      class="calendar-day"
      *ngFor="let day of calendarDays()"
      [class.other-month]="!day.isCurrentMonth"
      [class.today]="day.isToday"
      [class.selected]="selectedDay() && day.date.getTime() === selectedDay()!.getTime()"
      [class.has-events]="day.events.length > 0"
      (click)="onDayClick(day)"
    >
      <div class="day-number-wrapper">
        <span class="day-number">{{ day.dayNumber }}</span>
      </div>
      <div class="event-indicators" *ngIf="day.events.length > 0">
        <span
          class="event-dot"
          *ngFor="let event of day.events.slice(0, 3)"
          [class.highlighted]="isEventHighlighted(event)"
        ></span>
        <span class="more-events" *ngIf="day.events.length > 3">
          +{{ day.events.length - 3 }}
        </span>
      </div>
    </div>
  </div>

  <!-- Selected Day Events -->
  <div class="day-events" *ngIf="selectedDay()">
    <div class="events-header">
      <h4 class="events-title">
        {{ selectedDay() | date:'EEEE, MMMM d' }}
      </h4>
    </div>
    <div class="events-list" *ngIf="getEventsForDate(selectedDay()!).length > 0">
      <div
        class="event-item"
        *ngFor="let event of getEventsForDate(selectedDay()!)"
        [class.highlighted]="isEventHighlighted(event)"
        (click)="onEventClick(event, $event)"
      >
        <div class="event-time">{{ formatEventTime(event) }}</div>
        <div class="event-details">
          <div class="event-title">{{ event.title }}</div>
          <div class="event-description" *ngIf="event.description">
            {{ event.description }}
          </div>
        </div>
      </div>
    </div>
    <div class="no-events" *ngIf="getEventsForDate(selectedDay()!).length === 0">
      No events scheduled
    </div>
  </div>

  <!-- Today's Events (when no day selected) -->
  <div class="today-events" *ngIf="!selectedDay()">
    <div class="events-header">
      <h4 class="events-title">Today's Events</h4>
    </div>
    <div class="events-list" *ngIf="getEventsForDate(today).length > 0">
      <div
        class="event-item"
        *ngFor="let event of getEventsForDate(today)"
        [class.highlighted]="isEventHighlighted(event)"
        (click)="onEventClick(event, $event)"
      >
        <div class="event-time">{{ formatEventTime(event) }}</div>
        <div class="event-details">
          <div class="event-title">{{ event.title }}</div>
        </div>
      </div>
    </div>
    <div class="no-events" *ngIf="getEventsForDate(today).length === 0">
      No events today
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="loading()">
    <div class="spinner"></div>
  </div>
</div>
